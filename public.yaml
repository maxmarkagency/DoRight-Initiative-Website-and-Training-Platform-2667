openapi: 3.0.0
info:
  version: 1.0.0
  title: Podcast.co Public API
  contact:
    name: API Support
    url: help.podcast.co
    email: help@podcast.co
tags:
  - name: Introduction
    description: |
      Podcast.co Public API documentation
servers:
  - url: https://public-api.pod.co
paths:
  "/podcasts/{podcast_slug}":
    parameters:
      - $ref: "#/components/parameters/podcast_slug"
    get:
      summary: Get a podcast
      operationId: getPodcast
      tags:
        - podcasts
      responses:
        "200":
          description: A podcast
          content:
            application/json:
              schema:
                title: Single Podcast
                description: A single podcast response
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                        description: Standard GUID
                        example: 123e4567-e89b-12d3-a456-426655440000
                      title:
                        type: string
                        example: "Guardian: Football weekly"
                        minLength: 1
                        maxLength: 255
                      slug:
                        type: string
                        example: guardian-football-weekly
                        minLength: 1
                        maxLength: 265
                      categories:
                        type: array
                        items:
                          anyOf:
                            - type: object
                              title: Arts
                              description: Art category
                              properties:
                                main:
                                  description: Main category
                                  type: string
                                  enum:
                                    - Arts
                                sub:
                                  oneOf:
                                    - type: string
                                      title: subcategories
                                      enum:
                                        - Books
                                        - Design
                                        - Fashion & Beauty
                                        - Food
                                        - Performing Arts
                                        - Visual Arts
                                    - title: "null"
                                      nullable: true
                              required:
                                - main
                                - sub
                            - type: object
                              title: Business
                              properties:
                                main:
                                  description: Main category
                                  type: string
                                  enum:
                                    - Business
                                sub:
                                  oneOf:
                                    - type: string
                                      title: subcategories
                                      enum:
                                        - Careers
                                        - Entrepreneurship
                                        - Investing
                                        - Management
                                        - Marketing
                                        - Non-Profit
                                    - $ref: "#/paths/~1podcasts~1%7Bpodcast_slug%7D\
                                        /get/responses/200/content/application~\
                                        1json/schema/properties/data/properties\
                                        /categories/items/anyOf/0/properties/su\
                                        b/oneOf/1"
                              required:
                                - main
                                - sub
                            - type: object
                              title: Comedy
                              properties:
                                main:
                                  description: Main category
                                  type: string
                                  enum:
                                    - Comedy
                                sub:
                                  oneOf:
                                    - type: string
                                      title: subcategories
                                      enum:
                                        - Comedy Interviews
                                        - Improv
                                        - Stand-Up
                                    - $ref: "#/paths/~1podcasts~1%7Bpodcast_slug%7D\
                                        /get/responses/200/content/application~\
                                        1json/schema/properties/data/properties\
                                        /categories/items/anyOf/0/properties/su\
                                        b/oneOf/1"
                              required:
                                - main
                                - sub
                            - type: object
                              title: Education
                              properties:
                                main:
                                  description: Main category
                                  type: string
                                  enum:
                                    - Education
                                sub:
                                  oneOf:
                                    - type: string
                                      title: subcategories
                                      enum:
                                        - Courses
                                        - How To
                                        - Language Learning
                                        - Self-Improvement
                                    - $ref: "#/paths/~1podcasts~1%7Bpodcast_slug%7D\
                                        /get/responses/200/content/application~\
                                        1json/schema/properties/data/properties\
                                        /categories/items/anyOf/0/properties/su\
                                        b/oneOf/1"
                              required:
                                - main
                                - sub
                            - type: object
                              title: Fiction
                              properties:
                                main:
                                  description: Main category
                                  type: string
                                  enum:
                                    - Fiction
                                sub:
                                  oneOf:
                                    - type: string
                                      title: subcategories
                                      enum:
                                        - Comedy Fiction
                                        - Drama
                                        - Science Fiction
                                    - $ref: "#/paths/~1podcasts~1%7Bpodcast_slug%7D\
                                        /get/responses/200/content/application~\
                                        1json/schema/properties/data/properties\
                                        /categories/items/anyOf/0/properties/su\
                                        b/oneOf/1"
                              required:
                                - main
                                - sub
                            - type: object
                              title: Government
                              properties:
                                main:
                                  description: Main category
                                  type: string
                                  enum:
                                    - Government
                                sub:
                                  $ref: "#/paths/~1podcasts~1%7Bpodcast_slug%7D/get\
                                    /responses/200/content/application~1json/sc\
                                    hema/properties/data/properties/categories/\
                                    items/anyOf/0/properties/sub/oneOf/1"
                              required:
                                - main
                                - sub
                            - type: object
                              title: Health & Fitness
                              properties:
                                main:
                                  description: Main category
                                  type: string
                                  enum:
                                    - Health & Fitness
                                sub:
                                  oneOf:
                                    - type: string
                                      title: subcategories
                                      enum:
                                        - Alternative Health
                                        - Fitness
                                        - Medicine
                                        - Mental Health
                                        - Nutrition
                                        - Sexuality
                                    - $ref: "#/paths/~1podcasts~1%7Bpodcast_slug%7D\
                                        /get/responses/200/content/application~\
                                        1json/schema/properties/data/properties\
                                        /categories/items/anyOf/0/properties/su\
                                        b/oneOf/1"
                              required:
                                - main
                                - sub
                            - type: object
                              title: History
                              properties:
                                main:
                                  description: Main category
                                  type: string
                                  enum:
                                    - History
                                sub:
                                  $ref: "#/paths/~1podcasts~1%7Bpodcast_slug%7D/get\
                                    /responses/200/content/application~1json/sc\
                                    hema/properties/data/properties/categories/\
                                    items/anyOf/0/properties/sub/oneOf/1"
                              required:
                                - main
                                - sub
                            - type: object
                              title: Kids & Family
                              properties:
                                main:
                                  description: Main category
                                  type: string
                                  enum:
                                    - Kids & Family
                                sub:
                                  oneOf:
                                    - type: string
                                      title: subcategories
                                      enum:
                                        - Education for Kids
                                        - Parenting
                                        - Pets & Animals
                                        - Stories for Kids
                                    - $ref: "#/paths/~1podcasts~1%7Bpodcast_slug%7D\
                                        /get/responses/200/content/application~\
                                        1json/schema/properties/data/properties\
                                        /categories/items/anyOf/0/properties/su\
                                        b/oneOf/1"
                              required:
                                - main
                                - sub
                            - type: object
                              title: Leisure
                              properties:
                                main:
                                  description: Main category
                                  type: string
                                  enum:
                                    - Leisure
                                sub:
                                  oneOf:
                                    - type: string
                                      title: subcategories
                                      enum:
                                        - Animation & Manga
                                        - Automotive
                                        - Aviation
                                        - Crafts
                                        - Games
                                        - Hobbies
                                        - Home & Garden
                                        - Video Games
                                    - $ref: "#/paths/~1podcasts~1%7Bpodcast_slug%7D\
                                        /get/responses/200/content/application~\
                                        1json/schema/properties/data/properties\
                                        /categories/items/anyOf/0/properties/su\
                                        b/oneOf/1"
                              required:
                                - main
                                - sub
                            - type: object
                              title: Music
                              properties:
                                main:
                                  description: Main category
                                  type: string
                                  enum:
                                    - Music
                                sub:
                                  oneOf:
                                    - type: string
                                      title: subcategories
                                      enum:
                                        - Music Commentary
                                        - Music History
                                        - Music Interviews
                                    - $ref: "#/paths/~1podcasts~1%7Bpodcast_slug%7D\
                                        /get/responses/200/content/application~\
                                        1json/schema/properties/data/properties\
                                        /categories/items/anyOf/0/properties/su\
                                        b/oneOf/1"
                              required:
                                - main
                                - sub
                            - type: object
                              title: News
                              properties:
                                main:
                                  description: Main category
                                  type: string
                                  enum:
                                    - News
                                sub:
                                  oneOf:
                                    - type: string
                                      title: subcategories
                                      enum:
                                        - Business News
                                        - Daily News
                                        - Entertainment News
                                        - News Commentary
                                        - Politics
                                        - Sports News
                                        - Tech News
                                    - $ref: "#/paths/~1podcasts~1%7Bpodcast_slug%7D\
                                        /get/responses/200/content/application~\
                                        1json/schema/properties/data/properties\
                                        /categories/items/anyOf/0/properties/su\
                                        b/oneOf/1"
                              required:
                                - main
                                - sub
                            - type: object
                              title: Religion & Spirituality
                              properties:
                                main:
                                  description: Main category
                                  type: string
                                  enum:
                                    - Religion & Spirituality
                                sub:
                                  oneOf:
                                    - type: string
                                      title: subcategories
                                      enum:
                                        - Buddhism
                                        - Christianity
                                        - Hinduism
                                        - Islam
                                        - Judaism
                                        - Religion
                                        - Spirituality
                                    - $ref: "#/paths/~1podcasts~1%7Bpodcast_slug%7D\
                                        /get/responses/200/content/application~\
                                        1json/schema/properties/data/properties\
                                        /categories/items/anyOf/0/properties/su\
                                        b/oneOf/1"
                              required:
                                - main
                                - sub
                            - type: object
                              title: Science
                              properties:
                                main:
                                  description: Main category
                                  type: string
                                  enum:
                                    - Science
                                sub:
                                  oneOf:
                                    - type: string
                                      title: subcategories
                                      enum:
                                        - Astronomy
                                        - Chemistry
                                        - Earth Sciences
                                        - Life Sciences
                                        - Mathematics
                                        - Natural Sciences
                                        - Nature
                                        - Physics
                                        - Social Sciences
                                    - $ref: "#/paths/~1podcasts~1%7Bpodcast_slug%7D\
                                        /get/responses/200/content/application~\
                                        1json/schema/properties/data/properties\
                                        /categories/items/anyOf/0/properties/su\
                                        b/oneOf/1"
                              required:
                                - main
                                - sub
                            - type: object
                              title: Society & Culture
                              properties:
                                main:
                                  description: Main category
                                  type: string
                                  enum:
                                    - Society & Culture
                                sub:
                                  oneOf:
                                    - type: string
                                      title: subcategories
                                      enum:
                                        - Documentary
                                        - Personal Journals
                                        - Philosophy
                                        - Places & Travel
                                        - Relationships
                                    - $ref: "#/paths/~1podcasts~1%7Bpodcast_slug%7D\
                                        /get/responses/200/content/application~\
                                        1json/schema/properties/data/properties\
                                        /categories/items/anyOf/0/properties/su\
                                        b/oneOf/1"
                              required:
                                - main
                                - sub
                            - type: object
                              title: Sports
                              properties:
                                main:
                                  description: Main category
                                  type: string
                                  enum:
                                    - Sports
                                sub:
                                  oneOf:
                                    - type: string
                                      title: subcategories
                                      enum:
                                        - Baseball
                                        - Basketball
                                        - Cricket
                                        - Fantasy Sports
                                        - Football
                                        - Golf
                                        - Hockey
                                        - Rugby
                                        - Running
                                        - Soccer
                                        - Swimming
                                        - Tennis
                                        - Volleyball
                                        - Wilderness
                                        - Wrestling
                                    - $ref: "#/paths/~1podcasts~1%7Bpodcast_slug%7D\
                                        /get/responses/200/content/application~\
                                        1json/schema/properties/data/properties\
                                        /categories/items/anyOf/0/properties/su\
                                        b/oneOf/1"
                              required:
                                - main
                                - sub
                            - type: object
                              title: TV & Film
                              properties:
                                main:
                                  description: Main category
                                  type: string
                                  enum:
                                    - TV & Film
                                sub:
                                  oneOf:
                                    - type: string
                                      title: subcategories
                                      enum:
                                        - After Shows
                                        - Film History
                                        - Film Interviews
                                        - Film Reviews
                                        - TV Reviews
                                    - $ref: "#/paths/~1podcasts~1%7Bpodcast_slug%7D\
                                        /get/responses/200/content/application~\
                                        1json/schema/properties/data/properties\
                                        /categories/items/anyOf/0/properties/su\
                                        b/oneOf/1"
                              required:
                                - main
                                - sub
                            - type: object
                              title: Technology
                              properties:
                                main:
                                  description: Main category
                                  type: string
                                  enum:
                                    - Technology
                                sub:
                                  $ref: "#/paths/~1podcasts~1%7Bpodcast_slug%7D/get\
                                    /responses/200/content/application~1json/sc\
                                    hema/properties/data/properties/categories/\
                                    items/anyOf/0/properties/sub/oneOf/1"
                              required:
                                - main
                                - sub
                            - type: object
                              title: True Crime
                              properties:
                                main:
                                  description: Main category
                                  type: string
                                  enum:
                                    - True Crime
                                sub:
                                  $ref: "#/paths/~1podcasts~1%7Bpodcast_slug%7D/get\
                                    /responses/200/content/application~1json/sc\
                                    hema/properties/data/properties/categories/\
                                    items/anyOf/0/properties/sub/oneOf/1"
                              required:
                                - main
                                - sub
                            - title: Nullable
                              nullable: true
                        uniqueItems: true
                      description:
                        type: string
                        example: Weekly show giving you all the insights into the
                          Premier League and more.
                        minLength: 1
                      subtitle:
                        oneOf:
                          - type: string
                            example: The pod squad bring you puns and punditry from the
                              world of Football
                            minLength: 1
                            maxLength: 255
                          - title: Nullable
                            nullable: true
                      author:
                        oneOf:
                          - type: string
                            example: Guardian Boys
                            minLength: 1
                            maxLength: 255
                          - title: Nullable
                            nullable: true
                      website_url:
                        oneOf:
                          - type: string
                            description: Podcast website url
                            format: uri
                            example: https://www.theguardian.com/football/series/footballweekly
                          - title: Nullable
                            nullable: true
                      type:
                        type: string
                        enum:
                          - episodic
                          - serial
                        default: episodic
                        description: The type of podcast. Episodic plays out most recent
                          first.
                      language:
                        oneOf:
                          - type: string
                            description: ISO 6391 language code
                            example: en
                            format: ^([A-Za-z]{2})(-[A-Za-z]{2})?$
                          - title: Nullable
                            nullable: true
                      content_rating:
                        type: string
                        enum:
                          - clean
                          - explicit
                        description: optional content rating
                        example: clean
                      artwork:
                        oneOf:
                          - type: object
                            title: Podcast artwork
                            properties:
                              type:
                                type: string
                                enum:
                                  - podcast
                                default: podcast
                              urls:
                                type: array
                                items:
                                  type: object
                                  properties:
                                    size:
                                      type: string
                                      format: ^[0-9]*x[0-9]*$
                                      description: Size of the artwork
                                      example: 200x200
                                    url:
                                      type: string
                                      format: uri
                                      description: Url for the artwork
                                      example: https://artwork.pod.co/podcast/123.jpg
                                  required:
                                    - size
                                    - url
                            required:
                              - type
                              - urls
                          - title: Nullable
                            nullable: true
                      copyright:
                        type: string
                        example: 2018 John Doe & Family
                        minLength: 1
                        maxLength: 255
                      feed_url:
                        type: string
                        description: Podcast feed url
                        format: uri
                        example: https://www.feed.pod.co/podcasts/123e4567-e89b-12d3-a456-426655440000/feed
                      time_zone:
                        type: string
                        description: The podcast time zone identifier
                        example: Europe/London
                      settings:
                        type: object
                        properties:
                          podcastco_branding:
                            type: boolean
                            default: true
                            description: Podcast.co branding on pages and players.
                          private_podcast:
                            type: boolean
                            default: false
                            description: Make podcast private
                          pages_disabled:
                            type: boolean
                            default: false
                            description: Disable Podcast.co pages
                          weekly_digest_email:
                            type: boolean
                            default: false
                            description: Enable weekly digest email.
                        required:
                          - podcastco_branding
                          - private_podcast
                          - pages_disabled
                          - weekly_digest_email
                    required:
                      - id
                      - title
                      - slug
                      - categories
                      - description
                      - subtitle
                      - author
                      - website_url
                      - type
                      - language
                      - content_rating
                      - artwork
                      - copyright
                      - feed_url
                      - time_zone
                      - settings
                    additionalProperties: false
        "403":
          description: Account has been temporarily suspended
          content:
            application/json:
              schema:
                title: Invitation definitions
                properties:
                  type:
                    oneOf:
                      - type: string
                        format: uri
                        example: https://developers.podcast.co/problems/validation-error
                        pattern: /problems/.+
                      - type: string
                        enum:
                          - about:blank
                        description: No additional semantics over status code
                  title:
                    type: string
                    example: Not Found
                  detail:
                    type: string
                    example: Unable to find media.
                  status:
                    type: integer
                    example: 404
  "/podcasts/{podcast_slug}/player":
    parameters:
      - $ref: "#/components/parameters/podcast_slug"
    get:
      summary: Get player
      operationId: getPodcastPlayer
      description: |
        Get podcast specific player settings.
      tags:
        - podcasts
      responses:
        "200":
          description: A player
          content:
            application/json:
              schema:
                title: Player
                description: A player response
                type: object
                properties:
                  data:
                    type: object
                    title: Player
                    required:
                      - theme
                      - settings
                    properties:
                      theme:
                        type: object
                        title: Theme
                        required:
                          - background_color
                          - text_color
                          - accent_color
                          - button_style
                          - mini_player_style
                        properties:
                          background_color:
                            type: string
                            pattern: ^#([A-Fa-f0-9]{6}|[A-Fa-f0-9]{3})$
                            example: "#bada55"
                          text_color:
                            $ref: "#/paths/~1podcasts~1%7Bpodcast_slug%7D~1player/g\
                              et/responses/200/content/application~1json/schema\
                              /properties/data/properties/theme/properties/back\
                              ground_color"
                          accent_color:
                            $ref: "#/paths/~1podcasts~1%7Bpodcast_slug%7D~1player/g\
                              et/responses/200/content/application~1json/schema\
                              /properties/data/properties/theme/properties/back\
                              ground_color"
                          button_style:
                            type: string
                            enum:
                              - rounded
                              - square
                          mini_player_style:
                            type: string
                            enum:
                              - rounded
                              - square
                      settings:
                        type: object
                        title: Settings
                        required:
                          - allow_share
                          - allow_download
                          - allow_subscribe
                        properties:
                          allow_share:
                            type: boolean
                            default: true
                            description: Whether to allow social sharing or not
                          allow_download:
                            type: boolean
                            default: true
                            description: Whether to allow downloading the current episode
                              or not
                          allow_subscribe:
                            type: boolean
                            default: true
                            description: Whether to show feed link or not
        "403":
          $ref: "#/paths/~1podcasts~1%7Bpodcast_slug%7D/get/responses/403"
  "/podcasts/{podcast_slug}/subscribe_button":
    parameters:
      - $ref: "#/components/parameters/podcast_slug"
    get:
      summary: Get subscribe button
      operationId: getPodcastSubscribeButton
      tags:
        - subscribe button
      responses:
        "200":
          description: A subscribe button
          content:
            application/json:
              schema:
                title: Subscribe button
                description: A subscribe button response
                type: object
                properties:
                  data:
                    type: object
                    title: Subscribe button
                    required:
                      - theme
                      - services
                    properties:
                      theme:
                        type: object
                        title: Theme
                        required:
                          - background_color
                          - text_color
                        properties:
                          background_color:
                            type: string
                            pattern: ^#([A-Fa-f0-9]{6}|[A-Fa-f0-9]{3})$
                            example: "#bada55"
                          text_color:
                            $ref: "#/paths/~1podcasts~1%7Bpodcast_slug%7D~1subscrib\
                              e_button/get/responses/200/content/application~1j\
                              son/schema/properties/data/properties/theme/prope\
                              rties/background_color"
                      services:
                        type: object
                        title: Services
                        required:
                          - apple
                          - spotify
                          - stitcher
                          - acast
                          - tunein
                          - pocketcasts
                          - deezer
                          - iheart
                          - amazon_music
                          - listennotes
                          - podchaser
                          - youtube_music
                          - feed
                        properties:
                          apple:
                            type: string
                            description: Apple service url
                            format: uri
                            example: https://itunes.apple.com/my-favourite-podcast
                            nullable: true
                          spotify:
                            type: string
                            description: Spotify service url
                            format: uri
                            example: https://spotify.com/my-favourite-podcast
                            nullable: true
                          stitcher:
                            type: string
                            description: Stitcher service url
                            format: uri
                            example: https://stitcher.com/my-favourite-podcast
                            nullable: true
                          acast:
                            type: string
                            description: Acast service url
                            format: uri
                            example: https://play.acast.com/my-favourite-podcast
                            nullable: true
                          tunein:
                            type: string
                            description: Tunein service url
                            format: uri
                            example: http://tunein.com/podcasts/my-favourite-podcast
                            nullable: true
                          pocketcasts:
                            type: string
                            description: Pocketcasts service url
                            format: uri
                            example: https://play.pocketcasts.com/my-favourite-podcast
                            nullable: true
                          deezer:
                            type: string
                            description: Deezer service url
                            format: uri
                            example: https://deezer.com/my-favourite-podcast
                            nullable: true
                          iheart:
                            type: string
                            description: Pocketcasts service url
                            format: uri
                            example: https://iheart/podcast/my-favourite-podcast
                            nullable: true
                          amazon_music:
                            type: string
                            description: Amazon Music service url
                            format: uri
                            example: https://music.amazon.com/podcasts/my-favourite-podcast
                            nullable: true
                          listennotes:
                            type: string
                            description: Listennotes service url
                            format: uri
                            example: https://www.listennotes.com/c/bc9546c04f7445e48d611112ec6438ca
                            nullable: true
                          podchaser:
                            type: string
                            description: Podchaser service url
                            format: uri
                            example: https://www.podchaser.com/podcasts/my-favourite-podcast
                            nullable: true
                          youtube_music:
                            type: string
                            description: Youtube Music service url
                            format: uri
                            example: https://music.youtube.com/playlist?list=123abc
                            nullable: true
                          feed:
                            type: string
                            description: Feed service url
                            format: uri
                            example: https://www.feed.pod.co/podcasts/123e4567-e89b-12d3-a456-426655440000/feed
                            nullable: true
        "403":
          $ref: "#/paths/~1podcasts~1%7Bpodcast_slug%7D/get/responses/403"
  "/podcasts/{podcast_slug}/socials":
    parameters:
      - $ref: "#/components/parameters/podcast_slug"
    get:
      summary: Get socials
      operationId: getPodcastSocials
      tags:
        - podcasts
      responses:
        "200":
