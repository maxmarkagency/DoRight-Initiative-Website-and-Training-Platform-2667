  "/podcasts/{podcast_slug}/episodes/{episode_slug}/player":
    parameters:
      - $ref: "#/components/parameters/podcast_slug"
      - $ref: "#/components/parameters/episode_slug"
    get:
      summary: Get player
      operationId: getEpisodePlayer
      description: >
        Get episode specific player settings.  

        Podcast player settings will be returned as defaults if this episode doesnt have custom settings.
      tags:
        - episodes
      responses:
        "200":
          description: A player
          content:
            application/json:
              schema:
                $ref: "#/paths/~1podcasts~1%7Bpodcast_slug%7D~1player/get/responses\
                  /200/content/application~1json/schema"
        "403":
          $ref: "#/paths/~1podcasts~1%7Bpodcast_slug%7D/get/responses/403"
components:
  responses:
    Forbidden:
      description: Account has been temporarily suspended
      content:
        application/json:
          schema:
            title: Invitation definitions
            properties:
              type:
                oneOf:
                  - type: string
                    format: uri
                    example: https://developers.podcast.co/problems/validation-error
                    pattern: /problems/.+
                  - type: string
                    enum:
                      - about:blank
                    description: No additional semantics over status code
              title:
                type: string
                example: Not Found
              detail:
                type: string
                example: Unable to find media.
              status:
                type: integer
                example: 404
  parameters:
    podcast_slug:
      in: path
      name: podcast_slug
      required: true
      description: a podcast slug
      schema:
        type: string
        pattern: ^[a-z0-9]+(?:-[a-z0-9]+)*$
        example: guardian-football-weekly
    episode_slug:
      in: path
      name: episode_slug
      required: true
      description: an episode slug
      schema:
        type: string
        pattern: ^[a-z0-9]+(?:-[a-z0-9]+)*$
        example: german-tears-brazil-cheers-and-england-fears-world-cup-football-daily
    podcast_id:
      in: path
      name: podcast_id
      required: true
      description: a podcast id
      schema:
        type: string
        format: uuid
    page:
      in: query
      name: page
      description: The result page, defaults to 1 if invalid
      schema:
        type: integer
        default: 1
        minimum: 1
    per_page:
      in: query
      name: per_page
      description: The number of results per page, defaults to 10 if invalid
      schema:
        type: integer
        default: 10
        minimum: 1
        maximum: 100
security: []
